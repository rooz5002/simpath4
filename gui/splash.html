<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIMPATH 4</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d1a;
      color: #e0e0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    .logo {
      font-size: 2.8rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      margin-bottom: 6px;
    }
    .logo strong { font-weight: 700; color: #2196f3; }

    .subtitle {
      font-size: 0.85rem;
      color: #555;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .status {
      font-size: 0.8rem;
      color: #444;
      margin-bottom: 16px;
      min-height: 1.2em;
      transition: color 0.3s;
    }
    .status.ok  { color: #00c853; }
    .status.err { color: #ff5252; }

    /* Animated grid dots */
    .grid {
      display: grid;
      grid-template-columns: repeat(8, 10px);
      gap: 5px;
      margin-bottom: 40px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 2px;
      background: #1a1a2e;
      animation: pulse 1.6s ease-in-out infinite;
    }
    .dot:nth-child(1)  { animation-delay: 0.0s; }
    .dot:nth-child(2)  { animation-delay: 0.1s; }
    .dot:nth-child(3)  { animation-delay: 0.2s; }
    .dot:nth-child(4)  { animation-delay: 0.3s; }
    .dot:nth-child(5)  { animation-delay: 0.4s; }
    .dot:nth-child(6)  { animation-delay: 0.5s; }
    .dot:nth-child(7)  { animation-delay: 0.6s; }
    .dot:nth-child(8)  { animation-delay: 0.7s; }
    .dot:nth-child(9)  { animation-delay: 0.8s; }
    .dot:nth-child(10) { animation-delay: 0.9s; }
    .dot:nth-child(11) { animation-delay: 1.0s; }
    .dot:nth-child(12) { animation-delay: 1.1s; }
    .dot:nth-child(13) { animation-delay: 1.2s; }
    .dot:nth-child(14) { animation-delay: 1.3s; }
    .dot:nth-child(15) { animation-delay: 1.4s; }
    .dot:nth-child(16) { animation-delay: 1.5s; }

    @keyframes pulse {
      0%, 100% { background: #1a1a2e; }
      50%       { background: #2196f3; }
    }

    .copyright {
      position: absolute;
      bottom: 16px;
      font-size: 0.7rem;
      color: #2a2a4a;
    }

    .version {
      position: absolute;
      bottom: 16px;
      right: 16px;
      font-size: 0.7rem;
      color: #2a2a4a;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="logo">SIMPATH <strong>4</strong></div>
  <div class="subtitle">Path Planning Simulation</div>

  <div class="grid">
    <!-- 16 animated dots to evoke a path planning grid -->
    <div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div>
  </div>

  <div class="status" id="status">Starting engine…</div>

  <div class="copyright">© 2025 Amir Ali Mokhtarzadeh</div>
  <div class="version" id="ver">v0.1.0</div>

  <script>
    // Receive status updates from the Electron main process
    window.addEventListener('message', (e) => {
      const el = document.getElementById('status')
      if (!el) return
      el.textContent = e.data.text || ''
      el.className = 'status ' + (e.data.cls || '')
    })
  </script>
</body>
</html>
